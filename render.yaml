services:
  - type: web
    name: courtstax
    runtime: node
    plan: free
    buildCommand: "echo no build needed"
    startCommand: "node server.js"
    healthCheckPath: /api/state
    disk:
      name: courtstax-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
