<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CourtStax — Open Play Queue Manager</title>
<style>
  :root{
    --court:#1B4279;
    --court-deep:#081A30;
    --ball:#A8E600;
    --ball-deep:#8AC200;
    --line:#F6F4EC;
    --ink:#0A0D10;
    --ink-soft:#5B6A78;
    --warn:#E0793C;
    --danger:#C44C3B;
    --card:#FFFFFF;
    --rest:#9AA79B;
    --radius:14px;
    --shadow: 0 1px 2px rgba(10,13,16,.08), 0 8px 24px rgba(10,13,16,.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#060709;
    background-image:
      radial-gradient(circle at 12% -10%, rgba(168,230,0,.07), transparent 45%),
      radial-gradient(circle at 90% 10%, rgba(27,66,121,.18), transparent 50%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.02) 0 1px, transparent 1px 38px);
    color:var(--ink);
    font-family: ui-sans-serif, "Segoe UI", Inter, system-ui, -apple-system, sans-serif;
    min-height:100vh;
  }
  .display{ font-family: "Arial Black", "Helvetica Neue", Inter, sans-serif; font-weight:900; letter-spacing:-0.02em; }
  #root{max-width:1240px;margin:0 auto;padding:18px 18px 60px;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    margin-bottom:18px; flex-wrap:wrap;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{
    width:44px;height:44px;border-radius:11px;background:#000;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    box-shadow: 0 0 0 1px rgba(168,230,0,.25), 0 2px 8px rgba(0,0,0,.4);
  }
  .brand .mark img{width:100%;height:100%;object-fit:cover;}
  .brand h1{color:var(--line);font-size:21px;margin:0;letter-spacing:-0.01em;}
  .brand .sub{color:#7d93a5;font-size:12px;margin-top:1px;}
  .brand .clubname{color:var(--ball); font-size:16px; font-weight:800; margin-top:3px; letter-spacing:-0.01em;}

  .viewtoggle{display:flex;background:rgba(255,255,255,.08);border-radius:999px;padding:4px;gap:2px;}
  .viewtoggle button{
    border:none;background:transparent;color:#cfe0d3;padding:8px 16px;border-radius:999px;
    font-size:13px;font-weight:600;cursor:pointer;transition:.15s;
  }
  .viewtoggle button.active{background:var(--ball);color:var(--court-deep);}

  .grid{display:grid;grid-template-columns: 1.4fr 1fr; gap:16px;}
  @media (max-width:920px){ .grid{grid-template-columns:1fr;} }

  .card{
    background:var(--card); border-radius:var(--radius); padding:16px 16px 18px;
    box-shadow:var(--shadow);
  }
  .card h2{font-size:14px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin:0 0 12px;display:flex;align-items:center;justify-content:space-between;}
  .card h2 .count{background:var(--court);color:var(--line);font-size:11px;padding:2px 8px;border-radius:999px;font-weight:700;letter-spacing:0;}

  .courts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media (max-width:560px){.courts{grid-template-columns:1fr;}}
  .court{
    border-radius:12px; padding:12px; position:relative; overflow:hidden;
    border:2px solid var(--court); background:linear-gradient(160deg, var(--court) 0%, var(--court-deep) 100%);
    min-height:150px; color:var(--line);
    display:flex; flex-direction:column;
  }
  .court .label{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#bfe0cb;margin-bottom:8px;}
  .court .timer{font-variant-numeric:tabular-nums;background:rgba(0,0,0,.25);padding:2px 8px;border-radius:999px;}
  .court .teams{
    display:flex; flex-direction:column; flex:1; border-radius:8px; overflow:hidden;
    background:rgba(0,0,0,.12);
  }
  .court .side{
    display:flex; gap:6px; flex-wrap:wrap; align-items:center; flex:1;
    padding:8px 8px; position:relative;
  }
  .court .side.team-a{ border-bottom:2px dashed rgba(255,255,255,.45); }
  .court .side .vs{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    font-size:9px; color:rgba(255,255,255,.4); font-weight:800; letter-spacing:.06em;
  }
  .court .side.empty-slot{color:rgba(255,255,255,.35); font-size:11.5px; font-style:italic;}
  .chip{
    background:var(--line); color:var(--ink); font-size:12px; font-weight:700; padding:5px 9px;
    border-radius:8px; display:flex; align-items:center; gap:5px; box-shadow:0 1px 0 rgba(0,0,0,.08);
  }
  .chip .lvl{color:var(--ink-soft);font-weight:600;font-size:10.5px;}
  .court-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:#cfe0d3;}
  .btn{
    border:none; cursor:pointer; font-weight:700; border-radius:9px; padding:8px 13px; font-size:13px;
    transition:.12s; display:inline-flex; align-items:center; gap:6px;
  }
  .btn-ball{background:var(--ball); color:var(--court-deep);}
  .btn-ball:hover{background:var(--ball-deep);}
  .btn-ghost{background:rgba(255,255,255,.14); color:var(--line);}
  .btn-ghost:hover{background:rgba(255,255,255,.22);}
  .btn-line{background:transparent;border:1.5px solid var(--court); color:var(--court);}
  .btn-sm{padding:5px 9px;font-size:11.5px;border-radius:7px;}
  .btn-block{width:100%;justify-content:center;}
  .btn-danger{background:#fbe6e1;color:var(--danger);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  .flag{
    background:#FDF1E2; border:1px solid #F0CB9C; color:#9A5A1B; font-size:11.5px; font-weight:700;
    padding:3px 7px; border-radius:6px; display:inline-flex; align-items:center; gap:4px; margin-top:6px;
  }

  .winnerbox{display:flex; gap:6px; margin-top:8px;}
  .winbtn{flex:1; justify-content:center; font-size:11.5px; padding:7px 6px;}

  .queue-list{display:flex;flex-direction:column;gap:8px;max-height:560px;overflow:auto;padding-right:2px;}
  .qrow{
    display:flex; align-items:center; gap:10px; background:#F3F5F0; border-radius:11px; padding:9px 10px;
    border:1px solid #E4E9DF;
  }
  .qrow.priority{border-color:var(--ball-deep); background:#FBFCE9;}
  .qpos{
    width:26px;height:26px;border-radius:8px;background:var(--court);color:var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;flex-shrink:0;
  }
  .qrow .name{font-weight:700;font-size:13.5px;flex:1;min-width:0;}
  .qrow .meta{font-size:10.5px;color:var(--ink-soft);display:block;font-weight:500;}
  .status-pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;}
  .status-ready{background:#E2F4E1;color:#2C7A40;}
  .status-resting{background:#EFEFEF;color:#6B6B6B;}
  .status-leaving{background:#FDEAE6;color:#B6492F;}
  .status-injured{background:#FDE7EE;color:#B23061;}

  .addbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .addbar input, .addbar select{
    border:1.5px solid #DCE3D9; border-radius:9px; padding:9px 11px; font-size:13.5px; font-family:inherit;
  }
  .addbar input{flex:1;min-width:120px;}

  .tabs{display:flex;gap:6px;margin-bottom:12px;}
  .tabs button{
    flex:1; border:none; background:#EEF1EB; color:var(--ink-soft); padding:8px; border-radius:9px;
    font-weight:700; font-size:12.5px; cursor:pointer;
  }
  .tabs button.active{background:var(--court); color:var(--line);}

  .pagenav{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; -ms-overflow-style:none; scrollbar-width:none;
  }
  .pagenav::-webkit-scrollbar{display:none;}
  .pagenav button{
    flex:0 0 auto; border:none; background:rgba(255,255,255,.08); color:#cfe0d3; padding:9px 16px;
    border-radius:999px; font-weight:700; font-size:12.5px; cursor:pointer; white-space:nowrap;
  }
  .pagenav button.active{background:var(--ball); color:var(--court-deep);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;color:var(--ink-soft);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:4px 6px;border-bottom:1px solid #E7EAE3;}
  td{padding:7px 6px;border-bottom:1px solid #F0F2EC;font-weight:600;}
  tr:last-child td{border-bottom:none;}
  .rankbadge{width:20px;height:20px;border-radius:6px;background:var(--court);color:var(--line);display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}

  .empty-state{text-align:center;padding:30px 10px;color:var(--ink-soft);}
  .empty-state .big{font-size:34px;margin-bottom:6px;}

  .playerview-wrap{display:flex;justify-content:center;}
  .phone{
    width:340px; background:var(--ink); border-radius:32px; padding:14px; box-shadow:var(--shadow);
  }
  .phone .screen{background:var(--court-deep);border-radius:22px;padding:16px 14px;min-height:520px;color:var(--line);}
  .phone .yourpos{
    text-align:center;background:rgba(215,233,75,.1);border:1px solid rgba(215,233,75,.3);
    border-radius:16px;padding:18px 10px;margin-bottom:14px;
  }
  .phone .yourpos .num{font-size:46px;color:var(--ball);line-height:1;}
  .phone .yourpos .lbl{font-size:11px;color:#bfe0cb;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
  .phone h3{font-size:11px;text-transform:uppercase;color:#9fb4a8;letter-spacing:.05em;margin:14px 0 8px;}
  .phone select{width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:var(--line);border-radius:10px;padding:8px;font-size:13px;margin-bottom:4px;}
  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--ink); color:var(--line);
    padding:10px 18px; border-radius:999px; font-size:13px; font-weight:600; box-shadow:var(--shadow); z-index:50;
    display:flex; align-items:center; gap:8px;
  }
  .smallnote{font-size:11.5px;color:var(--ink-soft);margin-top:8px;line-height:1.4;}
  .iconbtn{background:transparent;border:none;cursor:pointer;color:var(--ink-soft);font-size:14px;padding:2px 4px;}
  .iconbtn:hover{color:var(--danger);}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,30,25,.55); backdrop-filter:blur(2px);
    display:flex; align-items:center; justify-content:center; z-index:80; padding:18px;
  }
  .modal{
    background:var(--card); border-radius:18px; max-width:420px; width:100%; padding:22px 22px 20px;
    box-shadow:var(--shadow); text-align:center; position:relative;
  }
  .modal .close{position:absolute; top:12px; right:14px; background:none; border:none; font-size:16px; cursor:pointer; color:var(--ink-soft);}
  .modal h3{margin:0 0 4px; font-size:16px;}
  .modal .qr-box{
    background:#fff; border:1px solid #E7EAE3; border-radius:12px; padding:18px;
    display:flex; align-items:center; justify-content:center; margin:14px auto; width:276px; height:276px;
  }
  .duprbadge{
    display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:800;
    background:#EAF1FE; color:#2659C8; padding:2px 7px; border-radius:999px; margin-left:4px;
  }
  .duprrow{display:flex; gap:6px; margin-top:6px;}
  .duprrow input{
    flex:1; border:1.5px solid #DCE3D9; border-radius:8px; padding:6px 8px; font-size:12px; font-family:inherit;
  }
  ::-webkit-scrollbar{width:7px;}
  ::-webkit-scrollbar-thumb{background:#CBD3C6;border-radius:10px;}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

// ---------- helpers ----------
const uid = () => Math.random().toString(36).slice(2,9);
const skillLabel = (s) => s.toFixed(1);
const now = () => Date.now();

function fmtElapsed(ms){
  const s = Math.floor(ms/1000);
  const m = Math.floor(s/60);
  const r = s%60;
  return `${m}:${r.toString().padStart(2,'0')}`;
}

function makePlayer_unused(){ /* player creation now happens server-side in server.js */ }

// ---------- Root: figures out which club session we're in, or shows the landing screen ----------
function Root(){
  const [clubCode, setClubCode] = useState(undefined); // undefined = still checking, null = need landing, string = ready

  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const fromUrl = params.get("club");
    const fromStorage = localStorage.getItem("courtstax_club");
    const code = (fromUrl || fromStorage || "").toUpperCase().trim();
    if(code){
      // confirm it's a real, still-existing session before committing to it
      fetch(`/api/session/${code}/state`)
        .then(res => res.ok ? setClubCode(code) : setClubCode(null))
        .catch(() => setClubCode(null));
    } else {
      setClubCode(null);
    }
  }, []);

  function enterClub(code){
    const c = code.toUpperCase().trim();
    localStorage.setItem("courtstax_club", c);
    const url = new URL(window.location.href);
    url.searchParams.set("club", c);
    window.history.replaceState({}, "", url);
    setClubCode(c);
  }

  function switchClub(){
    localStorage.removeItem("courtstax_club");
    const url = new URL(window.location.href);
    url.searchParams.delete("club");
    window.history.replaceState({}, "", url);
    setClubCode(null);
  }

  if(clubCode === undefined){
    return <div className="empty-state" style={{color:"#fff", paddingTop:60}}>Loading…</div>;
  }
  if(clubCode === null){
    return <Landing onEnter={enterClub} />;
  }
  return <App clubCode={clubCode} onSwitchClub={switchClub} />;
}

function Landing({onEnter}){
  const [mode, setMode] = useState("create"); // create | join
  const [clubName, setClubName] = useState("");
  const [joinCode, setJoinCode] = useState("");
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");

  async function createClub(){
    if(!clubName.trim()) { setError("Enter a club or group name."); return; }
    setBusy(true); setError("");
    try{
      const res = await fetch("/api/session", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ clubName: clubName.trim() }),
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || "Couldn't create session");
      onEnter(data.code);
    }catch(e){
      setError(e.message || "Something went wrong. Is the server running?");
    }finally{ setBusy(false); }
  }

  async function joinClub(){
    const code = joinCode.toUpperCase().trim();
    if(!code) { setError("Enter the club code you were given."); return; }
    setBusy(true); setError("");
    try{
      const res = await fetch(`/api/session/${code}/state`);
      if(!res.ok) throw new Error("No club found with that code — double-check it with your organizer.");
      onEnter(code);
    }catch(e){
      setError(e.message);
    }finally{ setBusy(false); }
  }

  return (
    <div style={{maxWidth:420, margin:"60px auto", padding:"0 16px"}}>
      <div className="card">
        <div style={{textAlign:"center", marginBottom:18}}>
          <h1 style={{fontFamily:"inherit", fontWeight:900, fontSize:26, margin:0}}>
            Court<span style={{color:"var(--ball-deep)"}}>Stax</span>
          </h1>
          <div style={{color:"var(--ink-soft)", fontSize:13, marginTop:2}}>Fair-rotation open play, anywhere in the world</div>
        </div>

        <div className="tabs" style={{marginBottom:16}}>
          <button className={mode==="create"?"active":""} onClick={()=>{setMode("create"); setError("");}}>Start a new club</button>
          <button className={mode==="join"?"active":""} onClick={()=>{setMode("join"); setError("");}}>Join with a code</button>
        </div>

        {mode === "create" ? (
          <React.Fragment>
            <label style={{fontSize:12.5, fontWeight:700, color:"var(--ink-soft)"}}>Club or group name</label>
            <input value={clubName} onChange={e=>setClubName(e.target.value)} placeholder="e.g. Manila Smashers"
              onKeyDown={e=>{ if(e.key==="Enter") createClub(); }}
              style={{width:"100%", border:"1.5px solid #DCE3D9", borderRadius:9, padding:"10px 12px", fontSize:14, margin:"6px 0 14px"}} />
            <button className="btn btn-ball btn-block" disabled={busy} onClick={createClub}>
              {busy ? "Creating…" : "Create our session"}
            </button>
            <div className="smallnote">This gives your club its own private code and link — no other club anywhere can see your data, and you can't see theirs.</div>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <label style={{fontSize:12.5, fontWeight:700, color:"var(--ink-soft)"}}>Club code</label>
            <input value={joinCode} onChange={e=>setJoinCode(e.target.value.toUpperCase())} placeholder="e.g. K7QX2P"
              onKeyDown={e=>{ if(e.key==="Enter") joinClub(); }}
              style={{width:"100%", border:"1.5px solid #DCE3D9", borderRadius:9, padding:"10px 12px", fontSize:14, margin:"6px 0 14px", letterSpacing:"0.1em", fontWeight:700}} />
            <button className="btn btn-ball btn-block" disabled={busy} onClick={joinClub}>
              {busy ? "Checking…" : "Join this session"}
            </button>
            <div className="smallnote">Ask your organizer for the code, or use the link/QR code they shared.</div>
          </React.Fragment>
        )}

        {error && <div className="smallnote" style={{color:"var(--danger)", marginTop:10}}>{error}</div>}
      </div>
    </div>
  );
}

// ---------- App ----------
function App({clubCode, onSwitchClub}){
  const [view, setView] = useState("organizer"); // organizer | player | monitor
  const [serverState, setServerState] = useState(null); // raw state from backend
  const [newName, setNewName] = useState("");
  const [newSkill, setNewSkill] = useState("3.0");
  const [toast, setToast] = useState(null);
  const [tab, setTab] = useState("queue"); // queue | leaderboard
  const [playerViewId, setPlayerViewId] = useState(null);
  const [showQR, setShowQR] = useState(false);
  const [connectionOk, setConnectionOk] = useState(true);

  // read URL hash on load so a scanned QR code can deep-link straight into the right view
  useEffect(()=>{
    const hash = window.location.hash || "";
    if(hash.includes("view=monitor")){
      setView("monitor");
    } else if(hash.includes("view=player")){
      setView("player");
      const m = hash.match(/playerId=([a-z0-9]+)/);
      if(m) setPlayerViewId(m[1]);
    }
  }, []);

  function showToast(msg){
    setToast(msg);
    clearTimeout(window.__t);
    window.__t = setTimeout(()=>setToast(null), 2600);
  }

  // ---- fetch this club's session state; every device polling this sees the same thing
  async function refresh(){
    try{
      const res = await fetch(`/api/session/${clubCode}/state`);
      if(!res.ok) throw new Error("bad response");
      const data = await res.json();
      setServerState(data);
      setConnectionOk(true);
    }catch(e){
      setConnectionOk(false);
    }
  }

  useEffect(()=>{
    refresh();
    const t = setInterval(refresh, 1500); // poll every 1.5s so all devices stay in sync
    return ()=>clearInterval(t);
  }, []);

  // ---- send an action to the backend, then immediately refresh so the UI feels instant
  async function doAction(name, payload){
    try{
      const res = await fetch(`/api/session/${clubCode}/action/${name}`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload||{}),
      });
      const data = await res.json();
      if(!res.ok){ showToast(data.error || "Action failed"); return; }
      setServerState(data);
      setConnectionOk(true);
      return data;
    }catch(e){
      setConnectionOk(false);
      showToast("Can't reach the server — is it running?");
    }
  }

  if(!serverState){
    return <div className="empty-state" style={{color:"#fff", paddingTop:60}}>Connecting to server…</div>;
  }

  const players = Object.values(serverState.players);
  const courts = serverState.courts;
  const queue = serverState.queue;
  const round = serverState.round;
  const courtsCount = serverState.courtsCount;
  const getPlayer = (id) => serverState.players[id];
  const waitingReady = queue.map(getPlayer).filter(Boolean);

  function addPlayer(){
    if(!newName.trim()) return;
    doAction("checkin", { name: newName.trim(), skill: parseFloat(newSkill) });
    setNewName("");
    showToast(`${newName.trim()} checked in`);
  }
  function setStatus(id, status){ doAction("setStatus", { id, status }); }
  function removePlayer(id){ doAction("removePlayer", { id }); }
  function connectDupr(id, duprId){
    doAction("connectDupr", { id, duprId });
    showToast(duprId && duprId.trim() ? "DUPR account linked" : "DUPR unlinked");
  }
  function setDuprSettings(clubId, apiKey){
    doAction("setDuprSettings", { clubId, apiKey });
    showToast("DUPR settings saved");
  }
  async function syncDupr(){
    const data = await doAction("syncDupr", {});
    if(data){
      const r = data.duprSettings.lastSyncResult;
      showToast(r && r.message ? r.message : "Sync attempted");
    }
  }
  function setCourtsCount(count){ doAction("setCourtsCount", { count }); }
  function fillCourt(courtId){ doAction("fillCourt", { courtId }); }
  function recordWinner(courtId, side){
    doAction("recordWinner", { courtId, side });
    showToast("Result logged — players sent to the back of the fair queue");
  }

  // ---- derived: mismatch suspects (a hot win streak may mean someone's underrated)
  const mismatchSuspects = players.filter(p => p.gamesPlayed >= 3 && p.flags >= 1);

// ---------- QR Modal ----------
function QRModal({onClose, clubCode}){
  const boxRef = useRef(null);
  const [copied, setCopied] = useState(false);
  const link = `${window.location.origin}${window.location.pathname}?club=${clubCode}#view=monitor`;

  useEffect(()=>{
    if(!boxRef.current) return;
    boxRef.current.innerHTML = "";
    new QRCode(boxRef.current, {
      text: link,
      width: 240, height: 240,
      colorDark: "#16201B", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H, // highest error correction — scans reliably even at an angle or on a glare-y phone screen
    });
  }, [link]);

  function copyLink(){
    navigator.clipboard.writeText(link).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false), 2000);
    }).catch(()=>{});
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="close" onClick={onClose}>✕</button>
        <h3>Scan to see the turn order</h3>
        <div className="smallnote" style={{marginTop:0}}>Anyone can scan this to watch this club's live queue update in real time, in order of who's up next — no app, no account.</div>
        <div className="qr-box" ref={boxRef}></div>
        <button className="btn btn-ghost btn-block" onClick={copyLink} style={{marginTop:4}}>
          {copied ? "✓ Link copied" : "📋 Copy link instead"}
        </button>
        <div className="smallnote" style={{wordBreak:"break-all", fontSize:10.5}}>{link}</div>
        <div className="smallnote" style={{marginTop:10, textAlign:"left", background:"#F3F5F0", padding:"8px 10px", borderRadius:8}}>
          This link is specific to your club (code {clubCode}) — anyone who opens it sees only your session, never another club's data, even though they may be using the same deployed server. If a camera has trouble scanning (low light, screen glare), tap "Copy link instead" and share it directly — texting, group chat, etc.
        </div>
      </div>
    </div>
  );
}

// ---------- Monitor view (what the QR opens — turn order board, no login) ----------
function MonitorView({players, queue, courts}){
  const getP = (id) => players.find(p=>p.id===id);
  return (
    <div className="card" style={{maxWidth:560, margin:"0 auto"}}>
      <h2>Turn order <span className="count">{queue.length} waiting</span></h2>
      <div className="courts" style={{marginBottom:16}}>
        {courts.map(c=>(
          <div key={c.id} className="court" style={{minHeight:90}}>
            <div className="label"><span>Court {c.id}</span></div>
            {c.players.length ? (
              <div style={{fontSize:12, display:"flex", flexWrap:"wrap", gap:4}}>
                {c.players.map(id=>{ const p=getP(id); return p ? <span className="chip" key={id}>{p.name}</span> : null; })}
              </div>
            ) : (
              <div style={{fontSize:11.5, color:"rgba(255,255,255,.5)"}}>Open</div>
            )}
          </div>
        ))}
      </div>
      {queue.length === 0 ? (
        <div className="empty-state"><div className="big">🎯</div>Everyone's on a court.</div>
      ) : (
        <div className="queue-list">
          {queue.map((id,i)=>{
            const p = getP(id); if(!p) return null;
            return (
              <div key={id} className={"qrow"+(i<4?" priority":"")}>
                <div className="qpos">{i+1}</div>
                <div style={{flex:1, minWidth:0}}>
                  <div className="name">{p.name}</div>
                  <span className="meta">{i<4 ? "Up next" : `${i+1-4} group(s) ahead`}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
      <div className="smallnote">This board updates live as games finish and players rotate — find your name to see how many groups are ahead of you.</div>
    </div>
  );
}

function Organizer(props){
  const {
    courts, courtsCount, setCourtsCount, queue, players,
    newName, setNewName, newSkill, setNewSkill, addPlayer,
    setStatus, removePlayer, fillCourt, recordWinner,
    tab, setTab, leaderboardCompetitive, leaderboardSocial, mismatchSuspects, onOpenPlayerView, connectDupr,
    duprSettings, setDuprSettings, syncDupr
  } = props;

  const [page, setPage] = useState("courts"); // courts | checkin | leaderboard | dupr

  const pages = [
    { id:"courts", label:`Courts & up next (${queue.length})` },
    { id:"checkin", label:"Check-in & players" },
    { id:"leaderboard", label:"Leaderboards" },
    { id:"dupr", label:"DUPR" },
  ];

  return (
    <div style={{display:"flex", flexDirection:"column", gap:16, maxWidth:820, margin:"0 auto"}}>

      <div className="pagenav">
        {pages.map(p=>(
          <button key={p.id} className={page===p.id ? "active":""} onClick={()=>setPage(p.id)}>{p.label}</button>
        ))}
      </div>

      {page === "courts" && (
        <React.Fragment>
          <div className="card">
            <h2>Courts <span className="count">{courts.filter(c=>c.players.length).length} / {courts.length} in play</span></h2>
            <div style={{display:"flex", gap:8, alignItems:"center", marginBottom:12}}>
              <label style={{fontSize:12.5, color:"var(--ink-soft)", fontWeight:600}}>Courts available</label>
              <input type="number" min="1" max="12" value={courtsCount}
                onChange={e=>setCourtsCount(Math.max(1, Math.min(12, parseInt(e.target.value||"1",10))))}
                style={{width:56, border:"1.5px solid #DCE3D9", borderRadius:8, padding:"5px 8px", fontWeight:700}} />
            </div>
            <div className="courts">
              {courts.map(c => (
                <CourtCard key={c.id} court={c} players={players} queueLen={queue.length}
                  fillCourt={fillCourt} recordWinner={recordWinner} />
              ))}
            </div>
            <div className="smallnote">
              Sending up the next 4 also auto-balances them into teams: it weighs skill level on each side and avoids repeating the same partner or opponent from recent rounds, so the matchup — not just the turn order — is optimized.
            </div>
          </div>

          {mismatchSuspects.length > 0 && (
            <div className="card" style={{borderLeft:"4px solid var(--warn)"}}>
              <h2 style={{color:"#9A5A1B"}}>Skill review flagged</h2>
              <div className="smallnote" style={{marginTop:-4, marginBottom:8}}>
                These players are on a 3+ game win streak. Their declared skill level may be underrated — worth a quick conversation before the next round.
              </div>
              {mismatchSuspects.map(p=>(
                <div key={p.id} className="qrow" style={{marginBottom:6}}>
                  <div className="name">{p.name} <span className="meta">declared {skillLabel(p.declaredSkill)} · {p.winStreak}-game win streak · {p.wins}-{p.losses} overall</span></div>
                </div>
              ))}
            </div>
          )}

          <div className="card">
            <h2>Up next <span className="count">{queue.length} waiting</span></h2>
            {queue.length === 0 ? (
              <div className="empty-state">
                <div className="big">🎯</div>
                Everyone's on a court.<br/>Check in a walk-on from the "Check-in & players" page.
              </div>
            ) : (
              <div className="queue-list">
                {queue.map((p, i) => (
                  <div key={p.id} className={"qrow" + (i<4 ? " priority":"")} style={{flexWrap:"wrap"}}>
                    <div className="qpos">{i+1}</div>
                    <div style={{flex:1, minWidth:140}}>
                      <div className="name">{p.name}</div>
                      <span className="meta">
                        {skillLabel(p.skill)} skill · {p.wins}-{p.losses} · {p.gamesPlayed} games
                        {p.sitOutStreak > 0 && <> · sat out {p.sitOutStreak}x</>}
                      </span>
                    </div>
                    <select value={p.status} onChange={e=>setStatus(p.id, e.target.value)}
                      style={{fontSize:11.5, border:"1px solid #DCE3D9", borderRadius:7, padding:"4px 6px"}}>
                      <option value="ready">Ready</option>
                      <option value="resting">Resting</option>
                      <option value="leaving">Leaving soon</option>
                      <option value="injured">Injured</option>
                    </select>
                    <button className="iconbtn" title="Remove from queue" onClick={()=>removePlayer(p.id)}>✕</button>
                  </div>
                ))}
              </div>
            )}
          <div className="smallnote">
            Queue order is automatic: players who've sat out longest and played the fewest games move to the front — no one gets stuck on the sideline twice in a row. You can change anyone's status or remove them here directly, even if they're next in line.
          </div>
          </div>
        </React.Fragment>
      )}

      {page === "checkin" && (
        <div className="card">
          <h2>Check-in &amp; players</h2>
          <div className="addbar">
            <input placeholder="Walk-on name" value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{ if(e.key==="Enter") addPlayer(); }} />
            <select value={newSkill} onChange={e=>setNewSkill(e.target.value)}>
              {["2.0","2.5","3.0","3.5","4.0","4.5","5.0"].map(s=>
                <option key={s} value={s}>{s} skill</option>)}
            </select>
            <button className="btn btn-ball" onClick={addPlayer}>Check in</button>
          </div>
          <AllPlayersList players={players} setStatus={setStatus} removePlayer={removePlayer} onOpenPlayerView={onOpenPlayerView} connectDupr={connectDupr} />
        </div>
      )}

      {page === "leaderboard" && (
        <div className="card">
          <Leaderboards competitive={leaderboardCompetitive} social={leaderboardSocial} />
        </div>
      )}

      {page === "dupr" && (
        <DuprPage players={players} duprSettings={duprSettings} setDuprSettings={setDuprSettings}
          syncDupr={syncDupr} connectDupr={connectDupr} />
      )}

    </div>
  );
}

function DuprPage({players, duprSettings, setDuprSettings, syncDupr, connectDupr}){
  const [clubId, setClubId] = useState(duprSettings.clubId || "");
  const [apiKey, setApiKey] = useState(duprSettings.apiKey || "");
  const connectedPlayers = players.filter(p=>p.duprConnected);

  return (
    <div className="card">
      <h2>DUPR integration</h2>
      <div className="smallnote" style={{marginTop:-4, marginBottom:12, background:"#FDF1E2", border:"1px solid #F0CB9C", borderRadius:8, padding:"8px 10px", color:"#9A5A1B"}}>
        This is groundwork, not a live connection yet. DUPR's match-results API is only available to
        approved partners — you'd need to apply through DUPR directly to get a real Club ID, API key,
        and their API docs. Everything below is ready to switch on the moment you have those.
      </div>

      <h3 style={{fontSize:13, margin:"4px 0 8px"}}>Club credentials</h3>
      <div className="duprrow" style={{marginBottom:6}}>
        <input placeholder="DUPR Club ID" value={clubId} onChange={e=>setClubId(e.target.value)} />
        <input placeholder="DUPR API key" value={apiKey} onChange={e=>setApiKey(e.target.value)} />
        <button className="btn btn-ball btn-sm" onClick={()=>setDuprSettings(clubId, apiKey)}>Save</button>
      </div>
      <div className="smallnote" style={{marginTop:0}}>
        Status: {duprSettings.configured
          ? <span className="duprbadge">Credentials saved</span>
          : <span style={{color:"var(--ink-soft)"}}>Not configured</span>}
      </div>

      <h3 style={{fontSize:13, margin:"18px 0 8px"}}>Sync</h3>
      <button className="btn btn-ghost" onClick={syncDupr}>Sync match results to DUPR</button>
      {duprSettings.lastSyncResult && (
        <div className="smallnote" style={{marginTop:8}}>
          Last attempt: {duprSettings.lastSyncResult.message}
        </div>
      )}

      <h3 style={{fontSize:13, margin:"18px 0 8px"}}>Players with a linked DUPR ID ({connectedPlayers.length}/{players.length})</h3>
      {connectedPlayers.length === 0 ? (
        <div className="smallnote" style={{marginTop:0}}>No players have linked a DUPR ID yet — they can do this from their own phone view, or you can add it from "Check-in & players."</div>
      ) : (
        <div className="queue-list" style={{maxHeight:220}}>
          {connectedPlayers.map(p=>(
            <div key={p.id} className="qrow">
              <div style={{flex:1}}>
                <div className="name">{p.name} <span className="duprbadge">DUPR ✓</span></div>
                <span className="meta">ID {p.duprId}</span>
              </div>
              <button className="iconbtn" title="Unlink" onClick={()=>connectDupr(p.id,"")}>✕</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CourtCard({court, players, queueLen, fillCourt, recordWinner}){
  const [elapsed, setElapsed] = useState(0);
  useEffect(()=>{
    if(!court.startedAt) { setElapsed(0); return; }
    const t = setInterval(()=> setElapsed(now() - court.startedAt), 1000);
    return ()=>clearInterval(t);
  }, [court.startedAt]);

  const getP = (id) => players.find(p=>p.id===id);
  const full = court.players.length === 4;

  return (
    <div className="court">
      <div className="label">
        <span>Court {court.id}</span>
        {full && <span className="timer">{fmtElapsed(elapsed)}</span>}
      </div>
      {full ? (
        <React.Fragment>
          <div className="teams">
            <div className="side team-a">
              {[court.players[0], court.players[1]].map(id => {
                const p = getP(id); if(!p) return null;
                return <span className="chip" key={id}>{p.name} <span className="lvl">{skillLabel(p.skill)}</span></span>;
              })}
              <span className="vs">VS</span>
            </div>
            <div className="side team-b">
              {[court.players[2], court.players[3]].map(id => {
                const p = getP(id); if(!p) return null;
                return <span className="chip" key={id}>{p.name} <span className="lvl">{skillLabel(p.skill)}</span></span>;
              })}
            </div>
          </div>
          <div className="winnerbox">
            <button className="btn btn-ghost btn-sm winbtn" onClick={()=>recordWinner(court.id,"A")}>🏆 Top team won</button>
            <button className="btn btn-ghost btn-sm winbtn" onClick={()=>recordWinner(court.id,"B")}>🏆 Bottom team won</button>
          </div>
        </React.Fragment>
      ) : (
        <div className="court-empty">
          <span>Empty court</span>
          <button className="btn btn-ghost btn-sm" disabled={queueLen<4} onClick={()=>fillCourt(court.id)}>
            {queueLen<4 ? `Need ${4-queueLen} more in queue` : "Send up next 4"}
          </button>
        </div>
      )}
    </div>
  );
}

function AllPlayersList({players, setStatus, removePlayer, onOpenPlayerView, connectDupr}){
  return (
    <div className="queue-list" style={{maxHeight:340}}>
      {players.map(p=>(
        <div key={p.id} className="qrow" style={{flexWrap:"wrap"}}>
          <div style={{flex:1, minWidth:160}}>
            <div className="name">
              {p.name}{" "}
              <span className={"status-pill status-"+p.status}>{p.status}</span>
              {p.duprConnected && <span className="duprbadge">DUPR ✓</span>}
            </div>
            <span className="meta">{skillLabel(p.skill)} skill · {p.wins}-{p.losses} · {p.gamesPlayed} games</span>
            <div className="duprrow">
              <input placeholder="DUPR ID" defaultValue={p.duprId}
                onBlur={e=>connectDupr(p.id, e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter") connectDupr(p.id, e.target.value); }} />
            </div>
          </div>
          <select value={p.status} onChange={e=>setStatus(p.id, e.target.value)}
            style={{fontSize:11.5, border:"1px solid #DCE3D9", borderRadius:7, padding:"4px 6px"}}>
            <option value="ready">Ready</option>
            <option value="resting">Resting</option>
            <option value="leaving">Leaving soon</option>
            <option value="injured">Injured</option>
          </select>
          <button className="iconbtn" title="View their phone screen" onClick={()=>onOpenPlayerView(p.id)}>📱</button>
          <button className="iconbtn" title="Remove" onClick={()=>removePlayer(p.id)}>✕</button>
        </div>
      ))}
    </div>
  );
}

function Leaderboards({competitive, social}){
  return (
    <div className="grid" style={{gridTemplateColumns:"1fr 1fr", gap:14}}>
      <div>
        <h2 style={{fontSize:12.5, marginBottom:8}}>Competitive rating</h2>
        <table>
          <thead><tr><th>#</th><th>Player</th><th>W-L</th><th>Win%</th></tr></thead>
          <tbody>
            {competitive.length===0 && <tr><td colSpan="4" style={{color:"var(--ink-soft)", fontWeight:500}}>No games logged yet.</td></tr>}
            {competitive.map((p,i)=>(
              <tr key={p.id}>
                <td><span className="rankbadge">{i+1}</span></td>
                <td>{p.name}</td>
                <td>{p.wins}-{p.losses}</td>
                <td>{Math.round(100*p.wins/p.gamesPlayed)}%</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div>
        <h2 style={{fontSize:12.5, marginBottom:8}}>Social / attendance</h2>
        <table>
          <thead><tr><th>#</th><th>Player</th><th>Games</th></tr></thead>
          <tbody>
            {social.map((p,i)=>(
              <tr key={p.id}>
                <td><span className="rankbadge" style={{background:"var(--ball-deep)", color:"var(--court-deep)"}}>{i+1}</span></td>
                <td>{p.name}</td>
                <td>{p.gamesPlayed}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="smallnote" style={{gridColumn:"1 / -1"}}>
        Kept separate on purpose: competitive rating rewards winning, social/attendance rewards showing up. One leaderboard for both made casual players avoid open play — this keeps it welcoming and still gives strong players something to chase.
      </div>
    </div>
  );
}

// ---------- Player (QR / phone) view ----------
function PlayerView({players, queue, courts, playerViewId, setPlayerViewId, setStatus, connectDupr}){
  const me = players.find(p=>p.id===playerViewId) || players[0];
  const [duprInput, setDuprInput] = useState(me ? (me.duprId || "") : "");

  useEffect(()=>{ if(me) setDuprInput(me.duprId || ""); }, [me && me.id]);

  if(!me) return <div className="empty-state">No players checked in yet.</div>;

  const myCourt = courts.find(c=>c.players.includes(me.id));
  const posInQueue = queue.indexOf(me.id);

  return (
    <div className="playerview-wrap">
      <div className="phone">
        <div className="screen">
          <h3 style={{marginTop:0}}>Viewing as</h3>
          <select value={me.id} onChange={e=>setPlayerViewId(e.target.value)}>
            {players.map(p=> <option key={p.id} value={p.id}>{p.name}</option>)}
          </select>

          {myCourt ? (
            <div className="yourpos" style={{background:"rgba(215,233,75,.18)"}}>
              <div className="num" style={{fontSize:26}}>ON COURT {myCourt.id}</div>
              <div className="lbl">Game in progress</div>
            </div>
          ) : (
            <div className="yourpos">
              <div className="num">{posInQueue>=0 ? `#${posInQueue+1}` : "—"}</div>
              <div className="lbl">{posInQueue>=0 ? "your spot in the queue" : (me.status!=="ready" ? me.status : "not in queue")}</div>
            </div>
          )}

          <h3>Your status</h3>
          <select value={me.status} onChange={e=>setStatus(me.id, e.target.value)}>
            <option value="ready">Ready to play</option>
            <option value="resting">Resting</option>
            <option value="leaving">Leaving soon</option>
            <option value="injured">Injured</option>
          </select>

          <h3>DUPR</h3>
          {me.duprConnected ? (
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", background:"rgba(255,255,255,.08)", borderRadius:10, padding:"8px 10px"}}>
              <span style={{fontSize:12.5}}>Linked · ID {me.duprId}</span>
              <button className="btn btn-ghost btn-sm" onClick={()=>{ connectDupr(me.id, ""); setDuprInput(""); }}>Unlink</button>
            </div>
          ) : (
            <div style={{display:"flex", gap:6}}>
              <input value={duprInput} onChange={e=>setDuprInput(e.target.value)} placeholder="Enter your DUPR ID"
                style={{flex:1, background:"rgba(255,255,255,.08)", border:"1px solid rgba(255,255,255,.2)", color:"var(--line)", borderRadius:10, padding:8, fontSize:12.5}} />
              <button className="btn btn-ball btn-sm" onClick={()=>connectDupr(me.id, duprInput)}>Connect</button>
            </div>
          )}
          <div className="smallnote" style={{color:"#9fb4a8"}}>Linking your DUPR ID lets results from this session sync to your official rating once a club's organizer exports match data.</div>

          <h3>Your stats</h3>
          <div style={{display:"flex", gap:8}}>
            <div style={{flex:1, background:"rgba(255,255,255,.08)", borderRadius:10, padding:"8px 10px"}}>
              <div style={{fontSize:18, fontWeight:800}}>{me.wins}-{me.losses}</div>
              <div style={{fontSize:10, color:"#9fb4a8"}}>RECORD</div>
            </div>
            <div style={{flex:1, background:"rgba(255,255,255,.08)", borderRadius:10, padding:"8px 10px"}}>
              <div style={{fontSize:18, fontWeight:800}}>{skillLabel(me.skill)}</div>
              <div style={{fontSize:10, color:"#9fb4a8"}}>SKILL</div>
            </div>
            <div style={{flex:1, background:"rgba(255,255,255,.08)", borderRadius:10, padding:"8px 10px"}}>
              <div style={{fontSize:18, fontWeight:800}}>{me.gamesPlayed}</div>
              <div style={{fontSize:10, color:"#9fb4a8"}}>GAMES</div>
            </div>
          </div>

          <h3>All courts</h3>
          {courts.map(c=>(
            <div key={c.id} style={{display:"flex", justifyContent:"space-between", fontSize:12.5, padding:"5px 0", borderBottom:"1px solid rgba(255,255,255,.08)"}}>
              <span>Court {c.id}</span>
              <span style={{color: c.players.length ? "var(--ball)" : "#9fb4a8"}}>
                {c.players.length ? "In play" : "Open"}
              </span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
